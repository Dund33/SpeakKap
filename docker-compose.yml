version: "3.9"

services:

  api:
    image: dund33/speak-kap:dev

    container_name: speak-kap-api

    ports:
      - "5000:5000"

    environment:
      REDIS_URL: redis://redis:6379/0
      WESPEAKER_DEVICE: cpu
      EMBEDDING_DIM: 512
      UPLOAD_FOLDER: uploads

    depends_on:
      - redis

    volumes:
      - uploads_data:/app/uploads

    restart: unless-stopped


  redis:
    image: redis/redis-stack:latest

    container_name: speak-kap-redis

    ports:
      - "6379:6379"
      - "8001:8001"

    volumes:
      - redis_data:/data

    restart: unless-stopped


volumes:

  redis_data:
  uploads_data: